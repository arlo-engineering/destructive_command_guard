name: bench

# Benchmark enforcement for performance regressions
#
# This workflow:
# 1. Runs Criterion benchmarks on pushes to main plus manual/scheduled runs
# 2. Does not reuse target/criterion across runs (avoids bogus +100% vs cached baselines)
# 3. Optionally warns if Criterion still reports a regression (rare with a clean dir)
# 4. Uploads benchmark results as artifacts
#
# Blocking perf gates use ci.yml perf-regression (committed JSON baseline), not Criterion % change.
#
# Performance budgets are defined in src/perf.rs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  # Allow manual trigger
  workflow_dispatch:
  # Run on schedule for baseline tracking
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build benchmarks
        run: cargo build --release --benches

      - name: Run benchmarks
        run: |
          # Without this, restoring target/criterion from cache compares this run to an
          # unrelated prior binary/runner and prints huge fake "regressions" (+100%+).
          # Use rm -r (no -f) so repo dcg scan passes; directory is Criterion output only.
          [ ! -d target/criterion ] || rm -r target/criterion
          cargo bench --bench heredoc_perf -- --noplot 2>&1 | tee bench-output.txt

          # Extract timing summary for CI
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Performance budgets are defined in \`src/perf.rs\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(time:|change:|Performance)' bench-output.txt | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Report regressions
        run: |
          # With a clean target/criterion, these should not appear; keep for visibility.
          if grep -q "Performance has regressed" bench-output.txt; then
            echo "::warning::Criterion reported a regression (unexpected after clearing target/criterion)"
            grep -A5 "Performance has regressed" bench-output.txt || true
          fi

          # Never fail on Criterion relative change: not comparable across machines.
          if grep -E "change:.*\+[5-9][0-9]\." bench-output.txt; then
            echo "::warning::Large Criterion change line present (>50% in output text)"
          fi

          if grep -E "change:.*\+[0-9]{3,}\." bench-output.txt; then
            echo "::warning::Very large Criterion change line present (>100% in output text)"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench-output.txt
            target/criterion
          retention-days: 30

