description = "Write-ahead logging"
readme = "README.md"
license-file = "LICENSE"
repository = "https://github.com/Dicklesworthstone/frankensqlite"
resolver = "2"

[features]
default = ["native"]
native = [
    "fsqlite-types/native",
    "fsqlite-vfs/native",
]
wasm = [
    "fsqlite-types/wasm",
    "fsqlite-vfs/wasm",
]

[lib]
