path = "benches/raptorq_matrix.rs"
harness = false

[dependencies.blake3]
version = "1.5"

[dependencies.crc32c]
version = "0.6"

[dependencies.fsqlite-error]
version = "0.1.2"

[dependencies.fsqlite-types]
version = "0.1.2"
